<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Сервисный центр - Бренды техники</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="services-card">
        <h2 class="services-title">РЕМОНТ ТЕХНИКИ РАЗЛИЧНЫХ БРЕНДОВ</h2>

        <!-- Десктопная сетка (видна на экранах больше 768px) -->
        <div class="brands-grid desktop-grid" id="desktopBrandsGrid"></div>

        <!-- Мобильный слайдер (виден на экранах до 768px) -->
        <div class="mobile-slider-container" id="mobileSliderContainer">
            <div class="slider-wrapper">
                <div class="slider-track" id="sliderTrack"></div>
            </div>
            <!-- Пагинация (кружочки) -->
            <div class="slider-pagination" id="sliderPagination"></div>
        </div>

        <!-- Кнопка переключения -->
        <div class="button-wrapper">
            <button class="toggle-btn" id="toggleBtn">Показать все</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
